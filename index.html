<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K FOOD SOLUTION | Elevating K-Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; }

        .fade-in { transition: opacity 0.8s ease-in-out; }
        .hidden-slide { opacity: 0; pointer-events: none; }
        .active-slide { opacity: 1; }

        /* Banner Progress Bar Animation */
        .progress-bar {
            height: 2px;
            background: rgba(255,255,255,0.3);
            width: 150px;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: white;
            width: 0%;
        }
        @keyframes progressAnim {
            from { width: 0%; }
            to { width: 100%; }
        }
        .animate-progress {
            animation: progressAnim 5000ms linear forwards;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="min-h-screen bg-white text-slate-900">

    <header class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm z-[100] border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-2xl font-black tracking-tighter text-red-600 cursor-pointer" onclick="window.scrollTo(0,0)">
                K FOOD SOLUTION
            </div>
            <nav class="hidden md:flex items-center space-x-8">
                <a href="#" class="text-sm font-bold tracking-widest hover:text-red-600 transition-colors uppercase">Our Philosophy</a>
                <a href="#our-brands" class="text-sm font-bold tracking-widest hover:text-red-600 transition-colors uppercase">Our Brands</a>
                <button class="bg-red-600 text-white px-6 py-3 text-sm font-bold tracking-widest hover:bg-red-700 transition-all uppercase rounded-full">Enquire Now</button>
            </nav>
            <button class="md:hidden" id="menu-btn"><i data-lucide="menu"></i></button>
        </div>
    </header>

    <section class="relative h-[85vh] overflow-hidden bg-black pt-20">
        <div id="hero-slider" class="absolute inset-0">
            </div>
        
        <div class="relative h-full flex items-center px-12 md:px-24 z-20">
            <div class="max-w-3xl text-white">
                <span class="inline-block px-3 py-1 bg-red-600 text-[10px] font-bold tracking-widest uppercase mb-4">Premium Quality</span>
                <h1 id="hero-title" class="text-5xl md:text-8xl font-black mb-6 tracking-tighter leading-none">ELEVATING<br>K-FOOD</h1>
            </div>
        </div>

        <div class="absolute bottom-12 left-12 md:left-24 flex items-center space-x-6 z-30 text-white/60 font-bold text-xs tracking-widest">
            <div id="hero-numbers" class="flex items-center space-x-4">
                </div>
            <div class="progress-bar">
                <div id="hero-progress" class="progress-fill"></div>
            </div>
        </div>
    </section>

    <section id="our-brands" class="py-24 bg-slate-50" style="scroll-margin-top: 100px;">
        <div class="max-w-7xl mx-auto px-6">
            <div class="mb-16">
                <h2 class="text-sm font-bold tracking-[0.3em] text-red-600 uppercase mb-4">Pork-free Korean Cuisine</h2>
                <h3 class="text-4xl md:text-5xl font-black uppercase">Our Brands</h3>
            </div>
            <div class="flex flex-col lg:flex-row gap-12 min-h-[600px]">
                <div id="brand-nav" class="lg:w-1/4 flex flex-row lg:flex-col overflow-x-auto no-scrollbar border-l border-slate-200"></div>
                <div class="lg:w-3/4 flex flex-col md:flex-row bg-white rounded-3xl shadow-xl overflow-hidden">
                    <div class="md:w-3/5 relative aspect-[4/3] md:aspect-auto overflow-hidden bg-slate-200" id="image-container">
                        <div class="absolute bottom-6 right-6 flex space-x-2 z-20">
                            <button onclick="changeSlide(-1)" class="p-3 bg-white/90 rounded-full shadow-lg"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                            <button onclick="changeSlide(1)" class="p-3 bg-white/90 rounded-full shadow-lg"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <div class="md:w-2/5 p-8 md:p-12 flex flex-col justify-center">
                        <h4 id="brand-name" class="text-3xl font-black mb-4 uppercase text-slate-900"></h4>
                        <p id="brand-tagline" class="text-lg font-bold text-slate-600 mb-6 italic"></p>
                        <p id="brand-desc" class="text-slate-500 leading-relaxed mb-8"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Hero Slider Configuration
        const heroSlides = [
            { image: 'banner-1.png', title: 'ELEVATING<br>K-FOOD' },
            { image: '542757880_122095103211013620_6375155299099234845_n.jpg', title: 'AUTHENTIC<br>FLAVORS' },
            { image: 'https://images.unsplash.com/photo-1547592166-23ac45744acd?q=80&w=2000', title: 'TRADITION<br>MEETS MODERN' }
        ];

        let currentHeroIndex = 0;
        const slideDuration = 5000;

        function initHero() {
            const container = document.getElementById('hero-slider');
            const numContainer = document.getElementById('hero-numbers');
            
            heroSlides.forEach((slide, i) => {
                const img = document.createElement('div');
                img.className = `absolute inset-0 bg-cover bg-center transition-opacity duration-1000 ${i === 0 ? 'active-slide' : 'hidden-slide'}`;
                img.style.backgroundImage = `linear-gradient(to right, rgba(0,0,0,0.8), transparent), url('${slide.image}')`;
                container.appendChild(img);

                const num = document.createElement('span');
                num.innerText = (i + 1).toString().padStart(2, '0');
                num.className = `cursor-pointer transition-colors ${i === 0 ? 'text-white' : 'text-white/30'}`;
                numContainer.appendChild(num);
            });
            
            startHeroTimer();
        }

        function startHeroTimer() {
            const progressBar = document.getElementById('hero-progress');
            progressBar.classList.remove('animate-progress');
            void progressBar.offsetWidth; // Trigger reflow
            progressBar.classList.add('animate-progress');

            setTimeout(() => {
                nextHeroSlide();
            }, slideDuration);
        }

        function nextHeroSlide() {
            const slides = document.querySelectorAll('#hero-slider div');
            const nums = document.querySelectorAll('#hero-numbers span');
            
            slides[currentHeroIndex].classList.replace('active-slide', 'hidden-slide');
            nums[currentHeroIndex].classList.replace('text-white', 'text-white/30');
            
            currentHeroIndex = (currentHeroIndex + 1) % heroSlides.length;
            
            slides[currentHeroIndex].classList.replace('hidden-slide', 'active-slide');
            nums[currentHeroIndex].classList.replace('text-white/30', 'text-white');
            document.getElementById('hero-title').innerHTML = heroSlides[currentHeroIndex].title;
            
            startHeroTimer();
        }

        // --- Original Brand Logic ---
        const brands = [
            { name: 'Oiso', tagline: 'Authentic Korean Comfort', description: 'Bringing the heart of Korean home-style cooking to your table.', images: ['oiso-1.jpg', 'oiso-2.jpg'] },
            { name: 'Neulbom Garden', tagline: 'Premium Korean BBQ', description: 'A sophisticated dining experience focusing on premium cuts.', images: ['neulbom-1.jpg', 'neulbom-2.jpg'] },
            { name: 'MiMi Guksu', tagline: 'Traditional Noodle House', description: 'Delicate, handmade noodles served in rich, savory broths.', images: ['542757880_122095103211013620_6375155299099234845_n.jpg', 'mimi-guksu-2.jpg'] }
        ];

        let activeBrandIndex = 0;
        let currentSlideIndex = 0;

        function renderBrandNav() {
            const nav = document.getElementById('brand-nav');
            nav.innerHTML = brands.map((brand, i) => `
                <button onclick="setActiveBrand(${i})" class="px-6 py-6 text-left border-l-4 ${i === activeBrandIndex ? 'border-red-600 text-red-600 bg-slate-100' : 'border-transparent text-slate-400'}">
                    <span class="text-xl font-black uppercase">${brand.name}</span>
                </button>
            `).join('');
        }

        function setActiveBrand(index) {
            activeBrandIndex = index;
            currentSlideIndex = 0;
            renderBrandNav();
            updateBrandDisplay();
        }

        function updateBrandDisplay() {
            const brand = brands[activeBrandIndex];
            document.getElementById('brand-name').innerText = brand.name;
            document.getElementById('brand-tagline').innerText = `"${brand.tagline}"`;
            document.getElementById('brand-desc').innerText = brand.description;
            const imgContainer = document.getElementById('image-container');
            imgContainer.querySelectorAll('img').forEach(img => img.remove());
            brand.images.forEach((src, i) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = `absolute inset-0 w-full h-full object-cover fade-in ${i === 0 ? 'active-slide' : 'hidden-slide'}`;
                imgContainer.prepend(img);
            });
        }

        function changeSlide(direction) {
            const slides = document.querySelectorAll('#image-container img');
            if (slides.length <= 1) return;
            slides[currentSlideIndex].classList.replace('active-slide', 'hidden-slide');
            currentSlideIndex = (currentSlideIndex + direction + slides.length) % slides.length;
            slides[currentSlideIndex].classList.replace('hidden-slide', 'active-slide');
        }

        initHero();
        renderBrandNav();
        updateBrandDisplay();
        lucide.createIcons();
    </script>
</body>
</html>
