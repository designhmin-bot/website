    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

<body>
    <div id="root"></div>

        const { useState, useEffect } = React;

        const Icon = ({ name, size = 20, className = "" }) => {

                                <a href="#" className="hover:text-red-600 transition">Our Brand</a>
                                <button className="bg-red-600 text-white px-8 py-3 rounded-full hover:bg-red-700 transition">ENQUIRE NOW</button>

                        </div>
                    </section>

                    {/* Portfolio Section */}
                    <section className="py-24 bg-[#F8F9FA]">

                            {/* Horizontal Tabs */}
                            <div className="flex border-b border-gray-200 mb-12 overflow-x-auto">

                                    <button 
                                        key={idx}

                                        className={`px-10 py-6 text-left transition-all relative min-w-[200px] ${activeBrand === idx ? 'bg-white' : 'opacity-40 hover:opacity-100'}`}

                                        <span className="text-xs font-bold text-red-600 block mb-1">0{idx + 1}</span>
                                        <span className="text-2xl font-black tracking-tighter uppercase">{brand.name}</span>

                                ))}

                                    <li><a href="#" className="hover:text-red-500 transition">Careers</a></li>
                                </ul>

                            <div>
                                <h5 className="font-bold tracking-widest text-xs uppercase mb-8 text-gray-400">Our Brands</h5>
                                <ul className="space-y-4 font-bold text-lg">

                                    </div>
                                    <div className="flex items-center gap-4">
                                        <Icon name="mail" className="text-red-600" />
                                        <p>inquiry@kfoodsolution.com</p>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <Icon name="phone" className="text-red-600" />

                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="max-w-7xl mx-auto px-6 pt-12 border-t border-gray-800 flex flex-col md:flex-row justify-between items-center text-xs font-bold text-gray-500 tracking-widest">
                            <p>© 2024 K FOOD SOLUTION. ALL RIGHTS RESERVED.</p>
                            <div className="flex space-x-8 mt-4 md:mt-0 uppercase">

                                <a href="#">Cookie Settings</a>
                                <a href="#">Sitemap</a>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
